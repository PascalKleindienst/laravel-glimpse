name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - Livewire ${{ matrix.livewire }}

    strategy:
      fail-fast: false
      matrix:
        php: [8.4, 8.5]
        laravel: [13.*, 12.*]
        livewire: [4.*, 3.*]
        include:
          - laravel: 13.*
            testbench: 11.*
          - laravel: 12.*
            testbench: 10.*

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, sqlite, gd, zip
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require --no-interaction --no-update "laravel/framework:${{ matrix.laravel }}" "livewire/livewire:${{ matrix.livewire }}"
          composer update --no-interaction --prefer-stable

      - name: Run tests
        run: composer test
