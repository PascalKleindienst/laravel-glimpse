name: Check & fix styling

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
        - name: Checkout code
          uses: actions/checkout@v6
          with:
            ref: ${{ github.head_ref }}

        - name: Run Lint Fix
          run: composer lint

        - name: Commit changes
          uses: stefanzweifel/git-auto-commit-action@v7
          with:
            commit_message: [fix] lint
