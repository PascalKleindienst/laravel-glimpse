template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

categories:
  - title: 🚀 Features
    labels:
      - feat
      - feature
      - enhancement
  - title: 🐛 Bug Fixes
    labels:
      - bug
      - fix
  - title: 📖 Documentation
    labels:
      - documentation
      - docs
  - title: ♻️ Refactoring
    labels:
      - refactoring
      - refactor
  - title: ⚡ Performance
    labels:
      - performance
      - perf
  - title: 🔧 Build & CI
    labels:
      - build
      - ci
      - dependencies
  - title: 🧪 Testing
    labels:
      - test
      - tests
  - title: 🛠️ Maintenance
    labels:
      - chore
      - maintenance
  - title: ⚠️ BREAKING CHANGES
    labels:
      - breaking
      - BREAKING CHANGE

version-resolver:
  major:
    labels:
      - breaking
      - BREAKING CHANGE
  minor:
    labels:
      - feat
      - feature
      - enhancement
  patch:
    labels:
      - bug
      - fix
      - refactor
      - refactoring
      - performance
      - documentation
      - docs
      - ci
      - chore
      - maintenance

name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
group-template: '- $TITLE (#$NUMBER) @$AUTHOR'
no-changes-template: '> No significant changes.'
sort-by: title
sort-direction: ascending
template-colors:
  # Default colors from Keep a Changelog
  heights:
    added: 3
    changed: 4
    deprecated: 5
    removed: 6
    fixed: 3
    security: 3
  colors:
    added: '3FB950'
    changed: 'F0883E'
    deprecated: 'F85149'
    removed: 'F85149'
    fixed: 'F85149'
    security: 'F85149'
