providers:
  - LaravelGlimpse\GlimpseServiceProvider

migrations:
  - database/migrations

env:
  GLIMPSE_GEO_DRIVER: sxgeo
  GLIMPSE_QUEUE_CONNECTION: sync
  CACHE_DRIVER: file

workbench:
  start: '/'
  install: true
  health: false
  discovers:
    web: true
    api: true
    commands: true
    components: false
    factories: true
    views: false
  build:
    - asset-publish
    - create-sqlite-db
    - db-wipe
    - migrate-fresh
  assets:
    - laravel-assets
