laravel: '@testbench'

providers:
  - LaravelGlimpse\GlimpseServiceProvider

migrations:
  - database/migrations

seeders:
  - Workbench\Database\Seeders\DatabaseSeeder

env:
  APP_LOCALE: de
  GLIMPSE_GEO_DRIVER: maxmind
  GLIMPSE_QUEUE_CONNECTION: sync
#  CACHE_STORE: file

workbench:
  start: '/glimpse'
  install: true
  auth: true
  user: "test@example.com"
  guard: web
  discovers:
    web: true
    commands: true
    factories: true
    components: true
    views: true
  build:
    - asset-publish
    - create-sqlite-db
    - db-wipe
    - migrate-fresh
  assets:
    - glimpse-assets
  sync:
    - from: public/vendor/glimpse
      to: public/vendor/glimpse
    - from: storage
      to: workbench/storage
      reverse: true
