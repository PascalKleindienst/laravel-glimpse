laravel: '@testbench'

providers:
  - LaravelGlimpse\GlimpseServiceProvider

migrations:
  - database/migrations

env:
  APP_LOCALE: de
  GLIMPSE_GEO_DRIVER: maxmind
  GLIMPSE_QUEUE_CONNECTION: sync
#  CACHE_STORE: file

workbench:
  start: '/'
  install: true
  discovers:
    web: true
    api: true
    commands: true
    components: false
    factories: true
    views: false
  build:
    - asset-publish
    - create-sqlite-db
    - db-wipe
    - migrate-fresh
  assets:
    - laravel-assets
  sync:
    - from: storage
      to: workbench/storage
      reverse: true
